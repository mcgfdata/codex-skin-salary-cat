name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-theme:
    name: Build and validate theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python scripts/build_presets.py
      - run: python scripts/validate_theme.py
      - name: Require reproducible generated files
        run: git diff --exit-code -- presets/preset-yuexinmiao
      - name: Check shell syntax
        run: bash -n Install.command Setup.command scripts/install-theme-macos.sh scripts/setup-skin-macos.sh
      - name: Check full setup dry run
        run: ./scripts/setup-skin-macos.sh --dry-run
      - name: Check Windows PowerShell source encoding
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path('.').rglob('*.ps1'):
              data = path.read_bytes()
              if any(byte >= 0x80 for byte in data) and not data.startswith(b'\xef\xbb\xbf'):
                  raise SystemExit(f'{path}: non-ASCII PowerShell 5.1 source requires a UTF-8 BOM')
          PY
      - name: Build install ZIP
        run: python scripts/package_release.py --output dist/codex-skin-salary-cat-test.zip
      - name: Check executable bit in ZIP
        run: |
          python - <<'PY'
          import zipfile

          with zipfile.ZipFile('dist/codex-skin-salary-cat-test.zip') as archive:
              for suffix in ('/Install.command', '/Setup.command', '/scripts/setup-skin-macos.sh'):
                  command = next(info for info in archive.infolist() if info.filename.endswith(suffix))
                  if not ((command.external_attr >> 16) & 0o111):
                      raise SystemExit(f'{suffix} is not executable in the release ZIP')
          PY

  windows-installer:
    name: Windows installer (${{ matrix.name }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows PowerShell 5.1
            executable: powershell.exe
          - name: PowerShell 7
            executable: pwsh.exe
    steps:
      - uses: actions/checkout@v4
      - name: Install twice in an isolated theme library
        shell: powershell
        run: |
          & '${{ matrix.executable }}' -NoLogo -NoProfile -ExecutionPolicy Bypass `
            -File .\scripts\test-windows-installer.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
