name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Check tag and project version
        run: test "${GITHUB_REF_NAME#v}" = "$(tr -d '\r\n' < VERSION)"
      - run: python scripts/build_presets.py
      - run: python scripts/validate_theme.py --release
      - run: git diff --exit-code -- presets/preset-yuexinmiao
      - name: Build release files
        run: |
          package="dist/codex-skin-salary-cat-${GITHUB_REF_NAME#v}.zip"
          python scripts/package_release.py --output "$package"
          sha256sum "$package" > "$package.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
